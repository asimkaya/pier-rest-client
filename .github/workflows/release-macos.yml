# macOS Apple Silicon (M1/M2/M3) only: DMG installer.
# - workflow_dispatch: build only; download the .dmg from the workflow run's Artifacts.
# - push tag v*: attach the DMG to an existing draft GitHub Release (or create one).
# Code signing (Gatekeeper): https://v2.tauri.app/distribute/sign/macos/

name: macOS arm64 (DMG)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend deps
        run: bun install

      - name: Build Tauri (DMG — Apple Silicon)
        run: bun run tauri build --target aarch64-apple-darwin

      - name: Upload DMG as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Pier-macOS-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Attach DMG to draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
