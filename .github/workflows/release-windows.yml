# Windows x64 only: NSIS installer (uninstall via Settings → Apps, or Add/Remove Programs).
# - workflow_dispatch: build only; download the .exe from the workflow run's Artifacts.
# - push tag v*: create a draft GitHub Release and attach the installer.
# Code signing (SmartScreen): https://v2.tauri.app/distribute/sign/windows/

name: Windows x64 (NSIS)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: bun install

      - name: Build Tauri (NSIS via tauri.windows.conf.json merge)
        run: bun run tauri build

      - name: Upload installer as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Pier-Windows-x64-setup
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Create draft GitHub Release with installer
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
